services:
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: caravan-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./utils:/app/utils:ro
      - ./logs:/app/logs:rw

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: caravan-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-443}:443"
    volumes:
      - ./utils:/app/utils:ro
      - ./logs:/app/logs:rw