services:
  # Database service - handles all MSSQL operations
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: caravan-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${DB_SERVICE_PORT:-8080}:8080"
    volumes:
      - ./utils:/app/utils:ro
      - ./logs:/app/logs:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Discord bot service
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: caravan-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./utils:/app/utils:ro
      - ./logs:/app/logs:rw
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: caravan-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-443}:443"
    volumes:
      - ./utils:/app/utils:ro
      - ./logs:/app/logs:rw
    depends_on:
      db:
        condition: service_healthy